// INICIO DEL ARCHIVO: android/app/build.gradle

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// Esta sección para leer el archivo local.properties está bien.
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

// Esta sección para encontrar el SDK de Flutter está bien.
def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new FileNotFoundException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

// Esta sección para leer las propiedades del keystore está bien.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

// =======================================================================
// AÑADE ESTE BLOQUE 'android' COMPLETO. ¡ESTA ES LA PARTE QUE FALTA!
// =======================================================================
android {
    namespace "com.neryad.PocketList" // Asegúrate que este es tu namespace correcto.

    // Basado en nuestra depuración, esta es la versión correcta para tu proyecto.
    compileSdkVersion 36

    // Configuración para el linting de Kotlin y Java.
    lintOptions {
        disable 'InvalidPackage'
    }

    // Configuración por defecto de la aplicación.
    defaultConfig {
        applicationId "com.neryad.PocketList" // Asegúrate que este es tu ID de aplicación.
        minSdkVersion 31
        targetSdkVersion 36
        versionCode 13       // Usando tus valores fijos.
        versionName "3.1.3" // Usando tus valores fijos.
    }

    // Configuración para firmar tus builds de release.
    signingConfigs {
        release {
            if (keystoreProperties['storeFile'] && keystoreProperties['storePassword'] && keystoreProperties['keyAlias'] && keystoreProperties['keyPassword']) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    // Define qué configuración de firma usar para cada tipo de build.
    buildTypes {
        release {
            if (keystoreProperties['storeFile'] && keystoreProperties['storePassword'] && keystoreProperties['keyAlias'] && keystoreProperties['keyPassword']) {
                signingConfig signingConfigs.release
            }
        }
    }

    // Configuración de compatibilidad de Java y Kotlin
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = '21'
    }
}
// =======================================================================
// FIN DEL BLOQUE AÑADIDO
// =======================================================================

dependencies {
    // Tus dependencias de test están bien.
    testImplementation 'junit:junit:4.12'
    androidTestImplementation 'androidx.test:runner:1.1.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.1.1'
}

// Esta sección que ya tenías está bien.
configurations.all {
    resolutionStrategy {
        force 'androidx.core:core:1.13.1'
        force 'androidx.core:core-ktx:1.13.1'
    }
}

// FIN DEL ARCHIVO
